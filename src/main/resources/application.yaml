spring:
  application:
    name: multithreaded-http-fileserver
  datasource:
    url: jdbc:postgresql://localhost:5432/http_file_server
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

  server:
    port: 8080
