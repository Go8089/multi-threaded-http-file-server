version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: http-file-server-db
    restart: unless-stopped

    environment:
      POSTGRES_DB: http_file_server
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: